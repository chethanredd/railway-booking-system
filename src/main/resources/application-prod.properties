# ── MySQL Production Configuration ───────────────────────────────
# Activate with: spring.profiles.active=prod
# Or: java -jar app.jar --spring.profiles.active=prod

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/railwaydb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://chethan:chethan@node1.fti4cut.mongodb.net/?appName=Node1}
spring.data.mongodb.database=${MONGODB_DATABASE:railway_pro}
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.info.env.enabled=false

live.status.refresh.enabled=true
live.status.refresh.cron=0 */5 * * * *
live.status.refresh.batch-size=20
live.status.cache.ttl-minutes=15

indianrailapi.base-url=${INDIANRAILAPI_BASE_URL:https://indianrailapi.com}
indianrailapi.key=${INDIANRAILAPI_KEY:}

app.dataset.import.enabled=${APP_DATASET_IMPORT_ENABLED:false}
app.dataset.import.trains-file=${APP_DATASET_TRAINS_FILE:data/kaggle/trains.json}
app.dataset.import.schedules-file=${APP_DATASET_SCHEDULES_FILE:data/kaggle/schedules.json}
