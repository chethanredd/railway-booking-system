<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Results - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">
      <div class="navbar-logo">🚂</div>
      <span class="navbar-brand-text">Rail<span>Way</span> Pro</span>
    </a>
    <ul class="navbar-links">
      <li><a href="/">Home</a></li>
      <li><a href="#" class="active">Search Results</a></li>
      <li><a th:href="@{/booking/pnr}">PNR Status</a></li>
      <li sec:authorize="isAuthenticated()"><a th:href="@{/booking/my-bookings}">My Tickets</a></li>
    </ul>
    <div class="navbar-actions">
      <div sec:authorize="!isAuthenticated()">
        <a th:href="@{/login}" class="btn btn-primary btn-sm">Login to Book</a>
      </div>
      <div sec:authorize="isAuthenticated()">
        <span class="text-sm text-muted" style="font-weight:600">👤 <span sec:authentication="name"></span></span>
        <a th:href="@{/profile}" class="btn btn-outline btn-sm" style="margin-left:0.5rem">Profile</a>
      </div>
    </div>
  </div>
</nav>

<!-- SEARCH BAR (Compact) -->
<div style="background: linear-gradient(135deg,#0f1b6e,#1a56db); padding:1.25rem 0;">
  <div class="container">
    <form th:action="@{/trains/search}" method="get">
      <div style="display:grid; grid-template-columns:1fr 1fr auto auto; gap:0.75rem; align-items:end;">
        <div class="form-group">
          <label class="form-label" style="color:rgba(255,255,255,0.7)">From</label>
          <input type="text" name="source" class="form-control" th:value="${source}" list="stations" required/>
        </div>
        <div class="form-group">
          <label class="form-label" style="color:rgba(255,255,255,0.7)">To</label>
          <input type="text" name="destination" class="form-control" th:value="${destination}" list="stations" required/>
        </div>
        <div class="form-group">
          <label class="form-label" style="color:rgba(255,255,255,0.7)">Date</label>
          <input type="date" name="date" class="form-control" th:value="${#temporals.format(date,'yyyy-MM-dd')}" required/>
        </div>
        <div class="form-group">
          <label class="form-label">&nbsp;</label>
          <button type="submit" class="btn btn-accent">🔍 Search</button>
        </div>
      </div>
      <input type="hidden" name="passengers" value="1"/>
      <datalist id="stations">
        <option th:each="station : ${stationSuggestions}" th:value="${station}"></option>
      </datalist>
    </form>
  </div>
</div>

<!-- RESULTS -->
<div class="container" style="padding-top:1.5rem; padding-bottom:3rem;">
  <div class="flex items-center justify-between mb-3">
    <div>
      <h1 style="font-size:1.375rem;" class="animate-in">
        🚂 Trains from
        <span th:text="${source}" style="color:var(--primary)"></span> →
        <span th:text="${destination}" style="color:var(--primary)"></span>
      </h1>
      <p class="text-muted text-sm" th:text="'Journey Date: ' + ${#temporals.format(date,'dd MMM yyyy, EEEE')}"></p>
    </div>
    <div class="text-muted text-sm">
      <strong th:text="${#lists.size(results)}"></strong> trains found
    </div>
  </div>

  <!-- No results -->
  <div th:if="${#lists.isEmpty(results)}" style="text-align:center; padding:4rem 0;">
    <div style="font-size:4rem; margin-bottom:1rem;">🔍</div>
    <h2 style="color:var(--gray-600);">No trains found</h2>
    <p class="text-muted">Try a different date or station combination.</p>
    <a href="/" class="btn btn-primary mt-3">← Search Again</a>
  </div>

  <!-- Train Cards -->
  <div th:each="result, stat : ${results}" class="train-card animate-in"
       th:style="'animation-delay:' + ${stat.index * 0.08} + 's'">
    <div class="train-card-header">
      <div>
        <div class="train-number" th:text="${result.train.trainNumber}"></div>
        <div class="train-name" th:text="${result.train.trainName}"></div>
        <span class="train-type-badge"
              th:classappend="${result.train.trainType.name() == 'RAJDHANI'} ? 'badge-rajdhani' :
                              (${result.train.trainType.name() == 'SHATABDI'} ? 'badge-shatabdi' :
                              (${result.train.trainType.name() == 'DURONTO'} ? 'badge-duronto' :
                              (${result.train.trainType.name() == 'VANDE_BHARAT'} ? 'badge-vande' : 'badge-default')))"
              th:text="${result.train.trainType.name().replace('_',' ')}"></span>
      </div>
      <div class="train-route">
        <div style="text-align:right">
          <div class="train-time" th:text="${#temporals.format(result.train.departureTime,'HH:mm')}"></div>
          <div class="train-station" th:text="${result.train.source}"></div>
        </div>
        <div class="route-line">
          <div class="route-duration"
               th:text="${result.train.durationMinutes / 60} + 'h ' + ${result.train.durationMinutes % 60} + 'm'"></div>
          <div class="route-bar"></div>
        </div>
        <div>
          <div class="train-time" th:text="${#temporals.format(result.train.arrivalTime,'HH:mm')}"></div>
          <div class="train-station" th:text="${result.train.destination}"></div>
        </div>
      </div>
      <div style="text-align:right">
        <div class="text-muted text-sm" th:text="'🛣️ ' + ${result.train.distanceKm} + ' km'"></div>
        <div class="text-muted text-xs" style="margin-top:0.25rem;"
             th:text="'Runs: ' + ${result.train.runningDays}"></div>
      </div>
    </div>

    <!-- Class availability row -->
    <div class="train-card-classes">
      <!-- Sleeper -->
      <a th:href="@{/booking/new(trainId=${result.train.trainId},date=${#temporals.format(date,'yyyy-MM-dd')},travelClass='SLEEPER',passengers=${passengers})}"
         class="class-cell" th:if="${result.slAvailable >= 0}">
        <div class="class-code">SL</div>
        <div class="class-avail" th:classappend="${result.slAvailable > 0} ? 'avail' : 'unavail'"
             th:text="${result.slAvailable > 0} ? ${result.slAvailable} + ' Avail' : 'Unavail'"></div>
        <div class="class-fare" th:text="'₹' + ${#numbers.formatInteger(result.slFare,1,'COMMA')}"></div>
      </a>
      <!-- AC 3 -->
      <a th:href="@{/booking/new(trainId=${result.train.trainId},date=${#temporals.format(date,'yyyy-MM-dd')},travelClass='AC_3_TIER',passengers=${passengers})}"
         class="class-cell">
        <div class="class-code">3A</div>
        <div class="class-avail" th:classappend="${result.ac3Available > 0} ? 'avail' : 'unavail'"
             th:text="${result.ac3Available > 0} ? ${result.ac3Available} + ' Avail' : 'Unavail'"></div>
        <div class="class-fare" th:text="'₹' + ${#numbers.formatInteger(result.ac3Fare,1,'COMMA')}"></div>
      </a>
      <!-- AC 2 -->
      <a th:href="@{/booking/new(trainId=${result.train.trainId},date=${#temporals.format(date,'yyyy-MM-dd')},travelClass='AC_2_TIER',passengers=${passengers})}"
         class="class-cell">
        <div class="class-code">2A</div>
        <div class="class-avail" th:classappend="${result.ac2Available > 0} ? 'avail' : 'unavail'"
             th:text="${result.ac2Available > 0} ? ${result.ac2Available} + ' Avail' : 'Unavail'"></div>
        <div class="class-fare" th:text="'₹' + ${#numbers.formatInteger(result.ac2Fare,1,'COMMA')}"></div>
      </a>
      <!-- AC 1 -->
      <a th:href="@{/booking/new(trainId=${result.train.trainId},date=${#temporals.format(date,'yyyy-MM-dd')},travelClass='AC_1_TIER',passengers=${passengers})}"
         class="class-cell">
        <div class="class-code">1A</div>
        <div class="class-avail" th:classappend="${result.ac1Available > 0} ? 'avail' : 'unavail'"
             th:text="${result.ac1Available > 0} ? ${result.ac1Available} + ' Avail' : 'Unavail'"></div>
        <div class="class-fare" th:text="'₹' + ${#numbers.formatInteger(result.ac1Fare,1,'COMMA')}"></div>
      </a>
      <!-- CC -->
      <a th:href="@{/booking/new(trainId=${result.train.trainId},date=${#temporals.format(date,'yyyy-MM-dd')},travelClass='CC',passengers=${passengers})}"
         class="class-cell">
        <div class="class-code">CC</div>
        <div class="class-avail" th:classappend="${result.ccAvailable > 0} ? 'avail' : 'unavail'"
             th:text="${result.ccAvailable > 0} ? ${result.ccAvailable} + ' Avail' : 'Unavail'"></div>
        <div class="class-fare" th:text="'₹' + ${#numbers.formatInteger(result.ccFare,1,'COMMA')}"></div>
      </a>
    </div>

    <!-- Route Matrix Visualization -->
    <div class="route-matrix-container mt-3" th:if="${#lists.size(result.train.routeStops) > 0}">
      <button class="btn btn-ghost btn-sm w-full toggle-route-btn" type="button" 
              onclick="this.nextElementSibling.classList.toggle('hidden')" 
              style="border: 1px dashed var(--border); color: var(--primary); justify-content:center;">
        🛤️ View Intermediate Route Timeline
      </button>
      <div class="route-timeline hidden" style="margin-top:0.75rem; padding:1.25rem; background:var(--primary-light); border-radius:var(--radius-md);">
        <h4 style="font-size:0.9rem; color:var(--primary); margin-bottom:1rem; font-weight:700;">Train Route Schedule</h4>
        <div style="position:relative; padding-left:20px; border-left:2px solid rgba(26,86,219,0.3);">
          <div th:each="stop : ${result.train.routeStops}" style="margin-bottom:1.25rem; position:relative;">
            <div style="position:absolute; left:-25px; top:4px; width:10px; height:10px; background:var(--primary); border-radius:50%; border:2px solid #fff;"></div>
            <div style="font-weight:700; font-size:0.9rem; color:var(--gray-800);" th:text="${stop.stationName}"></div>
            <div style="display:flex; gap:1rem; margin-top:0.25rem;" class="text-xs text-muted">
              <span>Arrives: <strong style="color:var(--gray-700);" th:text="${stop.arrivalTime}"></strong></span>
              <span>Departs: <strong style="color:var(--gray-700);" th:text="${stop.departureTime}"></strong></span>
              <span>Day: <strong style="color:var(--gray-700);" th:text="${stop.dayOffset}"></strong></span>
              <span>Dist: <strong style="color:var(--gray-700);" th:text="${stop.distanceKmFromOrigin} + ' km'"></strong></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
