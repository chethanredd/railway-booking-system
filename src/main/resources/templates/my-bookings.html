<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bookings - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">
      <div class="navbar-logo">🚂</div>
      <span class="navbar-brand-text">Rail<span>Way</span> Pro</span>
    </a>
    <ul class="navbar-links">
      <li><a href="/">Home</a></li>
      <li><a href="#" class="active">My Bookings</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="/" class="btn btn-primary btn-sm">+ New Booking</a>
    </div>
  </div>
</nav>

<div class="container" style="padding:2rem 1.5rem 3rem;">
  <div class="page-header">
    <div>
      <h1 class="page-title">🎫 My Bookings</h1>
      <div class="breadcrumb" th:text="${#lists.size(tickets)} + ' booking(s) found'"></div>
    </div>
  </div>

  <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>
  <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

  <!-- Empty State -->
  <div th:if="${#lists.isEmpty(tickets)}" style="text-align:center; padding:4rem 0;">
    <div style="font-size:4rem; margin-bottom:1rem;">🎫</div>
    <h2 style="color:var(--gray-600);">No bookings yet</h2>
    <p class="text-muted">Book your first train ticket today!</p>
    <a href="/" class="btn btn-primary mt-3">Search Trains</a>
  </div>

  <!-- Bookings List -->
  <div th:each="ticket, stat : ${tickets}" class="card mb-3 animate-in"
       th:style="'animation-delay:' + ${stat.index * 0.07} + 's'">
    <div class="card-body">
      <div style="display:grid; grid-template-columns:auto 1fr auto; gap:1.5rem; align-items:center;">
        <!-- Status -->
        <div style="text-align:center; min-width:90px;">
          <div class="text-muted text-xs" style="margin-bottom:0.25rem;">PNR</div>
          <div style="font-size:0.9rem; font-weight:800; color:var(--primary);" th:text="${ticket.pnr}"></div>
          <span class="ticket-status-badge mt-1 text-xs"
                th:classappend="${ticket.status.name() == 'CONFIRMED'} ? 'status-confirmed' :
                                (${ticket.status.name() == 'CANCELLED'} ? 'status-cancelled' : 'status-waitlisted')"
                th:text="${ticket.status.name()}"></span>
        </div>

        <!-- Route Info -->
        <div>
          <div style="font-weight:700; font-size:1rem;">
            <span th:text="${ticket.boardingStation}"></span>
            <span style="color:var(--primary); margin:0 0.5rem;">→</span>
            <span th:text="${ticket.destinationStation}"></span>
          </div>
          <div class="text-muted text-sm mt-1">
            🚂 <span th:text="${ticket.train.trainName}"></span> ·
            📅 <span th:text="${#temporals.format(ticket.journeyDate,'dd MMM yyyy')}"></span> ·
            🎫 <span th:text="${ticket.travelClass.displayName}"></span> ·
            👥 <span th:text="${#lists.size(ticket.passengers)}"></span> passenger(s)
          </div>
          <div class="text-muted text-xs mt-1"
               th:text="'Booked: ' + ${#temporals.format(ticket.bookedAt,'dd MMM yyyy, h:mm a')}"></div>
        </div>

        <!-- Fare & Actions -->
        <div style="text-align:right;">
          <div style="font-size:1.375rem; font-weight:800; color:var(--primary);"
               th:text="'₹' + ${#numbers.formatInteger(ticket.totalFare,1,'COMMA')}"></div>
          <div class="flex gap-1 mt-2" style="justify-content:flex-end; flex-wrap:wrap;">
            <a th:href="@{/booking/ticket/{pnr}(pnr=${ticket.pnr})}"
               class="btn btn-outline btn-sm">View</a>
            <a th:if="${ticket.status.name() != 'CANCELLED'}"
               th:href="@{/booking/cancel/{pnr}(pnr=${ticket.pnr})}"
               class="btn btn-danger btn-sm">Cancel</a>
            <span th:if="${ticket.status.name() == 'CANCELLED'}"
                  class="text-muted text-xs" style="padding:0.4rem 0.5rem;">
              Refund: ₹<span th:text="${#numbers.formatInteger(ticket.refundAmount,1,'COMMA')}"></span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
