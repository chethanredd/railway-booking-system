<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">
      <div class="navbar-logo">🚂</div>
      <span class="navbar-brand-text">Rail<span>Way</span> Pro</span>
    </a>
  </div>
</nav>

<div class="container animate-in" style="padding:5rem 1.5rem; text-align:center; max-width:600px;">
  <div style="font-size:6rem; line-height:1; color:var(--danger); font-weight:900; margin-bottom:1rem;"
       th:text="${errorCode} ?: 'Oops!'"></div>
  <h1 class="text-3xl mb-2" th:text="${errorTitle} ?: 'Something went wrong'"></h1>
  <p class="text-muted text-lg mb-4" th:text="${errorMessage} ?: 'We could not process your request right now. Please try again later.'"></p>

  <div class="flex gap-2" style="justify-content:center;">
    <a href="javascript:history.back()" class="btn btn-outline btn-lg">← Go Back</a>
    <a href="/" class="btn btn-primary btn-lg">Return Home</a>
  </div>

  <div style="margin-top:3rem; padding-top:2rem; border-top:1px solid var(--border); font-size:0.875rem; color:var(--gray-400);">
    If this problem persists, please <a href="#" style="text-decoration:underline;">contact support</a>.
  </div>
</div>
</body>
</html>
