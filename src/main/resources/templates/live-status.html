<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Train Status - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body style="background:var(--gray-50);">

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">
      <div class="navbar-logo">🚂</div>
      <span class="navbar-brand-text">Rail<span>Way</span> Pro</span>
    </a>
    <ul class="navbar-links">
      <li><a href="/">Home</a></li>
      <li><a href="#" class="active">Live Status</a></li>
      <li><a th:href="@{/booking/pnr}">PNR Status</a></li>
    </ul>
    <div class="navbar-actions">
        <!-- Re-use simple action box if needed -->
    </div>
  </div>
</nav>

<div class="container" style="padding-top:2rem; padding-bottom:3rem; max-width:800px;">

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div th:if="${status != null}">
      <!-- Header -->
      <div class="card mb-4" style="background:var(--primary); color:#fff;">
          <div class="card-body">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                  <div>
                      <div class="text-xs" style="color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:1px; font-weight:700;">Live Running Status</div>
                      <h1 style="font-size:1.75rem; font-weight:900; margin:0.25rem 0;" th:text="${status.trainNumber} + ' - ' + ${status.trainName}"></h1>
                      <div class="text-sm" th:text="'Journey Date: ' + ${status.journeyDate}"></div>
                      <div style="margin-top:0.5rem;">
                          <span th:if="${status.dataSource == 'LIVE'}" style="background:#16a34a; color:#fff; font-size:0.75rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:999px;">LIVE</span>
                          <span th:if="${status.dataSource == 'CACHED'}" style="background:#2563eb; color:#fff; font-size:0.75rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:999px;">CACHED</span>
                          <span th:if="${status.dataSource == 'SCHEDULED'}" style="background:#ca8a04; color:#fff; font-size:0.75rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:999px;">SCHEDULED</span>
                      </div>
                  </div>
                  <div style="text-align:right;">
                      <div style="font-size:2rem;">🚂</div>
                  </div>
              </div>
          </div>
          
          <div style="background:rgba(0,0,0,0.15); padding:1rem 1.5rem; border-bottom-left-radius:var(--radius-lg); border-bottom-right-radius:var(--radius-lg);">
              <div style="display:flex; gap:0.5rem; align-items:center;">
                  <span th:if="${status.isTerminated}" style="display:inline-block; width:12px; height:12px; border-radius:50%; background:var(--danger)"></span>
                  <span th:unless="${status.isTerminated}" style="display:inline-block; width:12px; height:12px; border-radius:50%; background:var(--success); animation: pulse 2s infinite;"></span>
                  
                  <span style="font-weight:700; font-size:1.1rem;" th:text="${status.currentStatusMessage}"></span>
                  
                  <span th:if="${status.currentDelayMinutes > 0}" style="margin-left:auto; background:var(--danger); padding:0.25rem 0.5rem; border-radius:var(--radius-sm); font-size:0.8rem; font-weight:700;">
                      Delayed by <span th:text="${status.currentDelayMinutes}"></span> mins
                  </span>
                  <span th:if="${status.currentDelayMinutes == 0 && !status.isTerminated}" style="margin-left:auto; background:var(--success); padding:0.25rem 0.5rem; border-radius:var(--radius-sm); font-size:0.8rem; font-weight:700;">
                      On Time
                  </span>
              </div>
          </div>
      </div>

      <!-- Distance Progress -->
      <div class="card mb-4">
          <div class="card-body">
              <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;" class="text-sm font-bold text-gray-700">
                  <span>Distance Covered</span>
                  <span th:text="${#numbers.formatDecimal(status.coveredDistanceKm, 0, 0)} + ' km / ' + ${#numbers.formatDecimal(status.totalDistanceKm, 0, 0)} + ' km'"></span>
              </div>
              <div style="height:8px; background:var(--gray-200); border-radius:999px; overflow:hidden;">
                  <div style="height:100%; background:var(--success); width:0%; transition:width 1s ease-in-out;" 
                       th:style="'width:' + (${status.totalDistanceKm > 0 ? (status.coveredDistanceKm * 100 / status.totalDistanceKm) : 0}) + '%; background:var(--success);'"></div>
              </div>
          </div>
      </div>

      <!-- Route Timeline -->
      <div class="card">
          <div class="card-body" style="padding:0;">
              <h2 style="font-size:1.1rem; padding:1.25rem 1.25rem 0;">Route Schedule</h2>
              <div style="padding:1.25rem;">
                  
                  <div style="position:relative; padding-left:30px;">
                      <!-- The main vertical line -->
                      <div style="position:absolute; left:6px; top:10px; bottom:20px; width:4px; background:var(--gray-200); border-radius:2px;"></div>
                      
                      <div th:each="node, stat : ${status.timeline}" style="position:relative; margin-bottom:2rem;">
                          
                          <!-- Node Dot -->
                          <div th:if="${node.isPassed}" style="position:absolute; left:-32px; top:4px; width:16px; height:16px; background:var(--success); border-radius:50%; z-index:2;"></div>
                          
                          <div th:if="${node.isCurrent}" style="position:absolute; left:-32px; top:4px; width:16px; height:16px; background:var(--primary); border:3px solid #fff; box-shadow:0 0 0 3px var(--primary-light); border-radius:50%; z-index:2; animation: pulse 2s infinite;"></div>
                          
                          <div th:if="${!node.isPassed && !node.isCurrent}" style="position:absolute; left:-32px; top:4px; width:16px; height:16px; background:#fff; border:3px solid var(--gray-300); border-radius:50%; z-index:2;"></div>
                          
                          <!-- Station Info -->
                          <div>
                              <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                  <div style="font-weight:700; font-size:1.1rem;" th:style="${node.isPassed ? 'color:var(--gray-500);' : 'color:var(--gray-900);'}" th:text="${node.stationName}"></div>
                                  <div class="text-xs font-bold text-muted" th:text="${node.distance} + ' km'"></div>
                              </div>
                              
                              <!-- Timings -->
                              <div style="display:flex; gap:2rem; margin-top:0.5rem;" class="text-sm">
                                  <div>
                                      <div class="text-xs text-muted">Arr</div>
                                      <div style="font-weight:600;" th:style="${node.isPassed ? 'text-decoration:line-through;color:var(--gray-400);' : ''}" th:text="${node.scheduledArrival}"></div>
                                  </div>
                                  <div>
                                      <div class="text-xs text-muted">Dep</div>
                                      <div style="font-weight:600;" th:style="${node.isPassed ? 'text-decoration:line-through;color:var(--gray-400);' : ''}" th:text="${node.scheduledDeparture}"></div>
                                  </div>
                                  <div>
                                      <div class="text-xs text-muted">Day</div>
                                      <div style="font-weight:600;" th:style="${node.isPassed ? 'color:var(--gray-400);' : ''}" th:text="${node.dayOffset}"></div>
                                  </div>
                              </div>

                              <div th:if="${node.isCurrent}" style="margin-top:0.75rem; background:rgba(26,86,219,0.1); padding:0.5rem 0.75rem; border-radius:var(--radius-sm); font-size:0.875rem; font-weight:600; color:var(--primary); display:inline-block;">
                                  🚂 Train is currently here
                              </div>

                          </div>
                      </div>
                  </div>
              </div>
          </div>
      </div>
  </div>
</div>

<style>
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.8; }
  100% { transform: scale(1); opacity: 1; }
}
</style>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
