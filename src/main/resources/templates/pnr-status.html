<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PNR Status - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">
      <div class="navbar-logo">🚂</div>
      <span class="navbar-brand-text">Rail<span>Way</span> Pro</span>
    </a>
    <ul class="navbar-links">
      <li><a href="/">Home</a></li>
      <li><a href="#" class="active">PNR Status</a></li>
    </ul>
  </div>
</nav>

<div class="container-sm" style="padding:3rem 1.5rem;">
  <div style="text-align:center; margin-bottom:2rem;">
    <div style="font-size:3rem; margin-bottom:0.75rem;">🔍</div>
    <h1 class="text-3xl">Check PNR Status</h1>
    <p class="text-muted">Enter your 10-digit PNR to get real-time booking status.</p>
  </div>

  <div class="card animate-in" style="margin-bottom:1.5rem;">
    <div class="card-body">
      <form th:action="@{/booking/pnr}" method="get"
            style="display:flex; gap:0.75rem; align-items:flex-end;">
        <div class="form-group" style="flex:1;">
          <label class="form-label" for="pnr">PNR Number</label>
          <div class="input-icon">
            <span class="icon">🎫</span>
            <input type="text" id="pnr" name="pnr" class="form-control"
                   th:value="${pnr}"
                   placeholder="Enter 10-digit PNR"
                   maxlength="10" pattern="[0-9]{10}"
                   autocomplete="off" autofocus/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" id="pnrBtn">
          Check Status
        </button>
      </form>
    </div>
  </div>

  <!-- Error -->
  <div th:if="${error}" class="alert alert-error animate-in">
    ❌ <span th:text="${error}"></span>
  </div>

  <!-- Ticket Result -->
  <div th:if="${ticket}" class="card animate-in">
    <div style="background:linear-gradient(135deg,#0f1b6e,#1a56db); border-radius:var(--radius-lg) var(--radius-lg) 0 0; padding:1.5rem; color:#fff; display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-size:0.75rem; color:rgba(255,255,255,0.6); text-transform:uppercase;">PNR</div>
        <div style="font-size:1.75rem; font-weight:900;" th:text="${ticket.pnr}"></div>
      </div>
      <span class="ticket-status-badge"
            th:classappend="${ticket.status.name() == 'CONFIRMED'} ? 'status-confirmed' :
                            (${ticket.status.name() == 'CANCELLED'} ? 'status-cancelled' : 'status-waitlisted')"
            th:text="${ticket.status.name()}"></span>
    </div>
    <div class="card-body">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:1.5rem;">
        <div>
          <div class="text-muted text-xs">Train</div>
          <div style="font-weight:700;" th:text="${ticket.train.trainNumber} + ' — ' + ${ticket.train.trainName}"></div>
        </div>
        <div>
          <div class="text-muted text-xs">Journey Date</div>
          <div style="font-weight:700;" th:text="${#temporals.format(ticket.journeyDate,'dd MMM yyyy, EEEE')}"></div>
        </div>
        <div>
          <div class="text-muted text-xs">From</div>
          <div style="font-weight:700;" th:text="${ticket.boardingStation} + ' ' + ${#temporals.format(ticket.train.departureTime,'(HH:mm)')}"></div>
        </div>
        <div>
          <div class="text-muted text-xs">To</div>
          <div style="font-weight:700;" th:text="${ticket.destinationStation} + ' ' + ${#temporals.format(ticket.train.arrivalTime,'(HH:mm)')}"></div>
        </div>
        <div>
          <div class="text-muted text-xs">Class</div>
          <div style="font-weight:700;" th:text="${ticket.travelClass.displayName}"></div>
        </div>
        <div>
          <div class="text-muted text-xs">Total Fare</div>
          <div style="font-weight:700; color:var(--primary);"
               th:text="'₹' + ${#numbers.formatInteger(ticket.totalFare,1,'COMMA')}"></div>
        </div>
      </div>

      <h3 style="font-size:0.9rem; margin-bottom:0.75rem;">Passengers</h3>
      <table class="passenger-table">
        <thead>
          <tr><th>#</th><th>Name</th><th>Age</th><th>Seat</th><th>Coach</th><th>Status</th></tr>
        </thead>
        <tbody>
          <tr th:each="p, stat : ${ticket.passengers}">
            <td th:text="${stat.count}"></td>
            <td style="font-weight:600;" th:text="${p.name}"></td>
            <td th:text="${p.age}"></td>
            <td th:text="${p.seatNumber} ?: 'WL/' + ${p.waitlistNumber}"></td>
            <td th:text="${p.coachNumber} ?: '—'"></td>
            <td>
              <span th:text="${p.seatStatus}"
                    th:style="${p.seatStatus.name() == 'CONFIRMED'} ? 'color:var(--success);font-weight:700' :
                               'color:var(--warn);font-weight:700'"></span>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="mt-3">
        <a th:href="@{/booking/ticket/{pnr}(pnr=${ticket.pnr})}" class="btn btn-primary">View Full Ticket</a>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
