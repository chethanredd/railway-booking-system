<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/navbar}"></div>

<div class="container" style="padding:2.5rem 1.5rem; max-width:800px;">
  <div class="page-header">
    <h1 class="page-title">👤 My Profile</h1>
  </div>

  <div th:if="${success}" class="alert alert-success animate-in">✅ <span th:text="${success}"></span></div>
  <div th:if="${error}" class="alert alert-error animate-in">❌ <span th:text="${error}"></span></div>

  <div class="card mb-4 animate-in">
    <div class="card-header"><h2 style="font-size:1.1rem;">Profile Details</h2></div>
    <div class="card-body">
      <form th:action="@{/profile/update}" method="post">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem;">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" th:value="${user.name}" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address (Cannot change)</label>
            <input type="email" class="form-control" th:value="${user.email}" disabled/>
          </div>
          <div class="form-group">
            <label class="form-label">Mobile Number</label>
            <input type="tel" name="mobile" class="form-control" th:value="${user.mobile}" maxlength="10"/>
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <input type="text" class="form-control" th:value="${user.role}" disabled/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Update Profile</button>
      </form>
    </div>
  </div>

  <div class="card animate-in animate-delay-1">
    <div class="card-header"><h2 style="font-size:1.1rem;">Change Password</h2></div>
    <div class="card-body">
      <form th:action="@{/profile/change-password}" method="post">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1.25rem;">
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input type="password" name="oldPassword" class="form-control" required/>
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" name="newPassword" class="form-control" minlength="8" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirmPassword" class="form-control" minlength="8" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Change Password</button>
      </form>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
