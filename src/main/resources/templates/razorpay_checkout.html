<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complete Payment - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body style="background:var(--gray-50); display:flex; justify-content:center; align-items:center; min-height:100vh;">

<div class="card" style="max-width:400px; width:100%; text-align:center; padding:3rem 2rem;">
  <div style="font-size:3rem; margin-bottom:1rem;">💳</div>
  <h2 style="font-weight:800; margin-bottom:0.5rem;">Initialize Razorpay Checkout</h2>
  <p class="text-muted text-sm mb-4">Please do not refresh this page. The payment overlay will appear momentarily.</p>

  <div style="background:var(--gray-100); border-radius:var(--radius-md); padding:1rem; margin-bottom:1.5rem;">
    <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
      <span class="text-muted text-sm">Amount Payable</span>
      <span style="font-weight:700; color:var(--primary);">₹<span th:text="${ticket.totalFare}"></span></span>
    </div>
    <div style="display:flex; justify-content:space-between;">
      <span class="text-muted text-sm">PNR</span>
      <span style="font-weight:700;" th:text="${ticket.pnr}"></span>
    </div>
  </div>

  <button id="rzp-button1" class="btn btn-primary w-full" style="font-size:1.1rem; padding:1rem;">Pay Now securely</button>

  <form id="razorpayForm" th:action="@{/booking/razorpay-success}" method="POST" style="display: none;">
      <input type="hidden" name="pnr" th:value="${ticket.pnr}"/>
      <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id"/>
      <input type="hidden" name="razorpay_order_id" id="razorpay_order_id"/>
      <input type="hidden" name="razorpay_signature" id="razorpay_signature"/>
  </form>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script th:inline="javascript">
  /*<![CDATA[*/
  var amountStr = /*[[${ticket.totalFare}]]*/ 0;
  var finalAmount = amountStr * 100;
  
  var options = {
      "key": /*[[${razorpayKeyId}]]*/ 'rzp_test_YourTestKeyIdHere', // Enter the Key ID generated from the Dashboard
      "amount": finalAmount, // Amount is in currency subunits. Default currency is INR. 
      "currency": "INR",
      "name": "RailWay Pro",
      "description": "Train Booking Transaction",
      "image": "https://example.com/your_logo",
      "order_id": /*[[${razorpayOrder['orderId']}]]*/ '', //This is a sample Order ID
      "handler": function (response){
          document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
          document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
          document.getElementById('razorpay_signature').value = response.razorpay_signature;
          document.getElementById('razorpayForm').submit();
      },
      "prefill": {
          "name": /*[[${user.name}]]*/ 'John Doe',
          "email": /*[[${user.email}]]*/ 'customer@example.com'
      },
      "theme": {
          "color": "#1a56db" // Matches our app primary blue
      }
  };
  var rzp1 = new Razorpay(options);
  rzp1.on('payment.failed', function (response){
          alert("Payment Failed! " + response.error.description);
  });
  document.getElementById('rzp-button1').onclick = function(e){
      rzp1.open();
      e.preventDefault();
  }
  
  // Auto open
  window.onload = function() {
      rzp1.open();
  };
  /*]]>*/
</script>
</body>
</html>
