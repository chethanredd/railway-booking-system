<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users - Admin - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<div class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-brand">🚂 RailWay Pro<br/><small style="font-size:0.7rem; font-weight:400; color:rgba(255,255,255,0.5);">Admin Panel</small></div>
    <ul class="sidebar-nav">
      <li><a th:href="@{/admin}"><span class="nav-icon">📊</span> Dashboard</a></li>
      <li><a th:href="@{/admin/trains}"><span class="nav-icon">🚂</span> Trains</a></li>
      <li><a th:href="@{/admin/users}" class="active"><span class="nav-icon">👥</span> Users</a></li>
      <li><a th:href="@{/admin/bookings}"><span class="nav-icon">🎫</span> Bookings</a></li>
      <li><a href="/"><span class="nav-icon">🏠</span> Public Site</a></li>
    </ul>
  </div>
  <div class="admin-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">👥 User Management</h1>
        <div class="breadcrumb" th:text="${#lists.size(users)} + ' registered users'"></div>
      </div>
    </div>

    <div class="table-container">
      <table class="table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Mobile</th>
            <th>Role</th>
            <th>Status</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u, stat : ${users}">
            <td th:text="${stat.count}"></td>
            <td style="font-weight:600;" th:text="${u.name}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.mobile} ?: '—'"></td>
            <td>
              <span th:text="${u.role}"
                    th:style="${u.role.name() == 'ADMIN'} ? 'color:var(--danger);font-weight:700' : 'color:var(--primary);font-weight:700'"></span>
            </td>
            <td>
              <span th:text="${u.enabled ? 'Active' : 'Disabled'}"
                    th:style="${u.enabled} ? 'color:var(--success);font-weight:700' : 'color:var(--danger);font-weight:700'"></span>
            </td>
            <td th:text="${#temporals.format(u.createdAt,'dd MMM yyyy')}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
