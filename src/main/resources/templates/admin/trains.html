<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Trains - Admin - RailWay Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<div class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-brand">🚂 RailWay Pro<br/><small style="font-size:0.7rem; font-weight:400; color:rgba(255,255,255,0.5);">Admin Panel</small></div>
    <ul class="sidebar-nav">
      <li><a th:href="@{/admin}"><span class="nav-icon">📊</span> Dashboard</a></li>
      <li><a th:href="@{/admin/trains}" class="active"><span class="nav-icon">🚂</span> Trains</a></li>
      <li><a th:href="@{/admin/users}"><span class="nav-icon">👥</span> Users</a></li>
      <li><a th:href="@{/admin/bookings}"><span class="nav-icon">🎫</span> Bookings</a></li>
      <li><a href="/"><span class="nav-icon">🏠</span> Public Site</a></li>
    </ul>
  </div>
  <div class="admin-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">🚂 Train Management</h1>
        <div class="breadcrumb" th:text="${#lists.size(trains)} + ' trains in database'"></div>
      </div>
      <a th:href="@{/admin/trains/add}" class="btn btn-primary">+ Add New Train</a>
    </div>

    <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-error">❌ <span th:text="${error}"></span></div>

    <div class="table-container">
      <table class="table">
        <thead>
          <tr>
            <th>Number</th>
            <th>Name</th>
            <th>From</th>
            <th>To</th>
            <th>Departure</th>
            <th>Arrival</th>
            <th>Type</th>
            <th>Distance</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="t : ${trains}">
            <td style="font-weight:700; color:var(--primary);" th:text="${t.trainNumber}"></td>
            <td style="font-weight:600;" th:text="${t.trainName}"></td>
            <td th:text="${t.source}"></td>
            <td th:text="${t.destination}"></td>
            <td th:text="${#temporals.format(t.departureTime,'HH:mm')}"></td>
            <td th:text="${#temporals.format(t.arrivalTime,'HH:mm')}"></td>
            <td>
              <span class="train-type-badge badge-default" th:text="${t.trainType.name().replace('_',' ')}"></span>
            </td>
            <td th:text="${t.distanceKm} + ' km'"></td>
            <td>
              <span th:text="${t.active ? 'Active' : 'Inactive'}"
                    th:style="${t.active} ? 'color:var(--success);font-weight:700' : 'color:var(--danger);font-weight:700'"></span>
            </td>
            <td>
              <div class="table-actions">
                <a th:href="@{/admin/trains/edit/{id}(id=${t.trainId})}" class="btn btn-outline btn-sm">Edit</a>
                <form th:action="@{/admin/trains/delete/{id}(id=${t.trainId})}" method="post"
                      onsubmit="return confirm('Delete this train?')">
                  <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
