# ── Active Profile ──────────────────────────────────────────────
spring.profiles.active=dev

# ── Application Name ─────────────────────────────────────────────
spring.application.name=RailWayPro

# ── Server ───────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ── Thymeleaf (View Layer) ───────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── MongoDB Configuration ─────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://chethan:chethan@node1.fti4cut.mongodb.net/?appName=Node1}
spring.data.mongodb.database=${MONGODB_DATABASE:railway_pro}

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.railway=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.org.springframework.security=INFO

# ── Razorpay Configuration ────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# ── Observability ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# ── Live Status Pipeline ─────────────────────────────────────────
live.status.refresh.enabled=true
live.status.refresh.cron=0 */5 * * * *
live.status.refresh.batch-size=20
live.status.cache.ttl-minutes=15

indianrailapi.base-url=${INDIANRAILAPI_BASE_URL:https://indianrailapi.com}
indianrailapi.key=${INDIANRAILAPI_KEY:}

app.dataset.import.enabled=${APP_DATASET_IMPORT_ENABLED:false}
app.dataset.import.trains-file=${APP_DATASET_TRAINS_FILE:data/kaggle/trains.json}
app.dataset.import.schedules-file=${APP_DATASET_SCHEDULES_FILE:data/kaggle/schedules.json}
